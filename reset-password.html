<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu – projectcanhan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="reset-body">

    <div class="reset-card">
        <p class="brand-name-sm">📅 projectcanhan</p>
        <h2>Đặt lại mật khẩu</h2>
        <p>Nhập mật khẩu mới của bạn bên dưới.</p>

        <div id="resetForm">
            <div class="form-group">
                <div class="input-with-toggle">
                    <input type="password" id="newPass" class="form-input"
                        placeholder="Mật khẩu mới (ít nhất 6 ký tự)" />
                    <button type="button" class="toggle-pass" onclick="togglePass()">👁</button>
                </div>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPass" class="form-input" placeholder="Xác nhận mật khẩu mới" />
            </div>
            <div id="resetError" class="form-message error" style="display:none;"></div>
            <div id="resetSuccess" class="form-message success" style="display:none;"></div>
            <button class="btn-primary btn-full" id="resetBtn" onclick="handleReset()">Đặt lại mật khẩu</button>
        </div>

        <div style="margin-top: 16px;">
            <a href="index.html" style="color: #1877F2; font-size: 14px; text-decoration: none; font-weight: 600;">
                ← Quay lại đăng nhập
            </a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');

        if (!token || !email) {
            document.getElementById('resetError').textContent = 'Link không hợp lệ. Vui lòng yêu cầu đặt lại mật khẩu mới.';
            document.getElementById('resetError').style.display = 'block';
            document.getElementById('resetBtn').disabled = true;
        }

        function togglePass() {
            const input = document.getElementById('newPass');
            const btn = document.querySelector('.toggle-pass');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }

        async function handleReset() {
            const newPassword = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const errEl = document.getElementById('resetError');
            const okEl = document.getElementById('resetSuccess');

            errEl.style.display = 'none';
            okEl.style.display = 'none';

            if (!newPassword || newPassword.length < 6) {
                errEl.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                errEl.style.display = 'block';
                return;
            }
            if (newPassword !== confirm) {
                errEl.textContent = 'Mật khẩu xác nhận không khớp.';
                errEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';

            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    okEl.textContent = '✅ ' + data.message;
                    okEl.style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    errEl.textContent = data.message || 'Có lỗi xảy ra.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Đặt lại mật khẩu';
                }
            } catch {
                errEl.textContent = 'Không thể kết nối server.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Đặt lại mật khẩu';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleReset();
        });
    </script>
</body>

</html>
