<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch trình – projectcanhan</title>
    <meta name="description" content="Xem và quản lý lịch trình cá nhân của bạn." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json">
</head>

<body class="dashboard-body">

    <!-- ====== NAVBAR ====== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <!-- Logo -->
            <a href="month-picker.html" class="nav-logo">
                <!-- SVG Logo Calsoli: vòng tròn gradient + tia sáng -->
                <svg class="calsoli-logo-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#00dcc0" />
                            <stop offset="100%" stop-color="#7b2fff" />
                        </linearGradient>
                        <linearGradient id="lg2" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#00dcc0" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.8" />
                        </linearGradient>
                    </defs>
                    <!-- Vòng ngoài -->
                    <circle cx="16" cy="16" r="14" stroke="url(#lg1)" stroke-width="2" fill="none" />
                    <!-- Kim đồng hồ giờ -->
                    <line x1="16" y1="16" x2="16" y2="8" stroke="url(#lg1)" stroke-width="2.2" stroke-linecap="round" />
                    <!-- Kim đồng hồ phút -->
                    <line x1="16" y1="16" x2="22" y2="19" stroke="url(#lg2)" stroke-width="1.8"
                        stroke-linecap="round" />
                    <!-- Tâm -->
                    <circle cx="16" cy="16" r="2" fill="url(#lg1)" />
                    <!-- Dấu tích nhỏ trên vòng -->
                    <circle cx="16" cy="4" r="1" fill="url(#lg1)" opacity="0.7" />
                    <circle cx="28" cy="16" r="1" fill="url(#lg1)" opacity="0.5" />
                    <circle cx="4" cy="16" r="1" fill="url(#lg1)" opacity="0.5" />
                </svg>
                <span class="logo-text">CaltDHy</span>
            </a>

            <!-- Nav center: tháng điều hướng -->
            <div class="nav-center">
                <button class="nav-month-btn" id="prevMonthBtn" onclick="changeMonth(-1)"
                    title="Tháng trước">&#8592;</button>
                <span class="nav-month-title" id="monthTitle">Tháng ...</span>
                <button class="nav-month-btn" id="nextMonthBtn" onclick="changeMonth(1)"
                    title="Tháng sau">&#8594;</button>
                <button class="nav-today-btn" onclick="goToday()">Hôm nay</button>
            </div>

            <!-- Nav right: user info -->
            <div class="nav-right">
                <div class="nav-user" id="navUser">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span class="user-name" id="userName">Người dùng</span>
                </div>
                <button class="nav-back-btn" onclick="window.location.href='month-picker.html'" title="Quay lại">
                    ← Quay lại
                </button>
                <button class="nav-logout-btn" onclick="handleLogout()" title="Đăng xuất">
                    <span>Đăng xuất</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ====== CALENDAR MAIN ====== -->
    <main class="calendar-main">
        <!-- Loading skeleton -->
        <div class="calendar-loading" id="calendarLoading">
            <div class="loading-spinner"></div>
            <p>Đang tải lịch trình...</p>
        </div>

        <!-- Calendar grid -->
        <div class="calendar-wrapper" id="calendarWrapper" style="display:none;">
            <!-- Days of week header -->
            <div class="calendar-header-row">
                <div class="day-header">CN</div>
                <div class="day-header">Thứ 2</div>
                <div class="day-header">Thứ 3</div>
                <div class="day-header">Thứ 4</div>
                <div class="day-header">Thứ 5</div>
                <div class="day-header">Thứ 6</div>
                <div class="day-header">Thứ 7</div>
            </div>
            <!-- Calendar cells container -->
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </main>

    <!-- ====== MODAL THÊM / SỬA SỰ KIỆN ====== -->
    <div class="modal-overlay" id="eventModal" style="display:none;" onclick="closeModalOnOverlay(event)">
        <div class="modal-card" id="modalCard">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Thêm lịch trình</h3>
                <button class="modal-close" onclick="closeModal()" title="Đóng">&times;</button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="eventId" />

                <div class="form-group">
                    <label class="form-label">Tên công việc <span class="required">*</span></label>
                    <input type="text" id="eventTitle" class="form-input" placeholder="Ví dụ: Họp nhóm dự án..."
                        maxlength="100" />
                </div>

                <div class="form-group">
                    <label class="form-label">Ngày <span class="required">*</span></label>
                    <input type="date" id="eventDate" class="form-input" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Giờ bắt đầu</label>
                        <input type="hidden" id="eventStart" />
                        <div class="time-picker-custom" id="startTimePicker">
                            <select id="startHour" title="Giờ" onchange="syncTimePicker('start')"></select>
                            <span class="time-picker-sep">:</span>
                            <select id="startMin" title="Phút" onchange="syncTimePicker('start')"></select>
                            <select id="startAmPm" title="AM/PM" onchange="syncTimePicker('start')">
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Giờ kết thúc</label>
                        <input type="hidden" id="eventEnd" />
                        <div class="time-picker-custom" id="endTimePicker">
                            <select id="endHour" title="Giờ" onchange="syncTimePicker('end')"></select>
                            <span class="time-picker-sep">:</span>
                            <select id="endMin" title="Phút" onchange="syncTimePicker('end')"></select>
                            <select id="endAmPm" title="AM/PM" onchange="syncTimePicker('end')">
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Ghi chú</label>
                    <textarea id="eventDesc" class="form-input form-textarea" placeholder="Mô tả thêm về công việc..."
                        maxlength="500" rows="3"></textarea>
                </div>

                <!-- Mức độ ưu tiên + Bật thông báo -->
                <div class="form-group">
                    <div class="priority-notify-row">
                        <div class="priority-col">
                            <label class="form-label">Mức độ ưu tiên</label>
                            <div class="color-picker">
                                <label class="color-opt"><input type="radio" name="eventColor" value="#1877F2"
                                        checked /><span style="background:#1877F2;"></span></label>
                                <label class="color-opt"><input type="radio" name="eventColor" value="#42b72a" /><span
                                        style="background:#42b72a;"></span></label>
                                <label class="color-opt"><input type="radio" name="eventColor" value="#e74c3c" /><span
                                        style="background:#e74c3c;"></span></label>
                                <label class="color-opt"><input type="radio" name="eventColor" value="#f39c12" /><span
                                        style="background:#f39c12;"></span></label>
                                <label class="color-opt"><input type="radio" name="eventColor" value="#9b59b6" /><span
                                        style="background:#9b59b6;"></span></label>
                                <label class="color-opt"><input type="radio" name="eventColor" value="#1abc9c" /><span
                                        style="background:#1abc9c;"></span></label>
                            </div>
                        </div>
                        <!-- Notification toggle -->
                        <div class="notify-toggle-wrap">
                            <label class="form-label" for="notifyToggle">Bật thông báo</label>
                            <label class="notify-switch">
                                <input type="checkbox" id="notifyToggle" />
                                <span class="notify-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="modalError" class="form-message error" style="display:none;"></div>

            </div>

            <div class="modal-footer">
                <button class="btn-danger" id="deleteBtn" onclick="handleDeleteEvent()" style="display:none;">🗑
                    Xóa</button>
                <div class="footer-right">
                    <button class="btn-secondary" onclick="closeModal()">Hủy</button>
                    <button class="btn-primary" id="saveBtn" onclick="handleSaveEvent()">💾 Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== DAY DETAIL POPUP ====== -->
    <div class="day-detail-overlay" id="dayDetailModal" style="display:none;" onclick="closeDayDetailOnOverlay(event)">
        <div class="day-detail-card" id="dayDetailCard">
            <div class="day-detail-header">
                <h3 class="day-detail-title" id="dayDetailTitle">Ngày</h3>
                <button class="day-detail-close" onclick="closeDayDetail()" title="Đóng">&times;</button>
            </div>
            <div class="day-detail-body" id="dayDetailBody"></div>
        </div>
    </div>

    <!-- ====== COPY SCHEDULE MODAL ====== -->
    <div class="modal-overlay" id="copyScheduleModal" style="display:none;"
        onclick="if(event.target===this)closeCopyModal()">
        <div class="modal-card copy-modal-card">
            <div class="modal-header">
                <h3 class="modal-title">📋 Sao chép lịch trình</h3>
                <button class="modal-close" onclick="closeCopyModal()" title="Đóng">&times;</button>
            </div>
            <div class="modal-body" style="gap:14px;">
                <p class="copy-modal-desc">Hãy chọn ngày mà bạn muốn sao chép công việc <span
                        style="color:rgba(231,76,60,0.9);font-weight:700;">(màu đỏ)</span> từ đó.</p>
                <div class="copy-target-info" id="copyTargetInfo"></div>
                <div class="form-group">
                    <label class="form-label">Chọn ngày nguồn <span class="required">*</span></label>
                    <input type="date" id="copySourceDate" class="form-input" style="color-scheme:dark;" />
                </div>
                <p class="copy-modal-note">💡 Chỉ các lịch trình được đánh màu <strong
                        style="color:#e74c3c;">đỏ</strong> mới được sao chép.</p>
            </div>
            <div class="modal-footer">
                <div class="footer-right">
                    <button class="btn-secondary" onclick="closeCopyModal()">Hủy</button>
                    <button class="btn-primary" onclick="handleCopySchedule()">📋 Xác nhận sao chép</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== TOAST NOTIFICATION ====== -->
    <div class="toast" id="toast"></div>


    <script>
        /* ============================================================
           AUTH GUARD
        ============================================================ */
        (function () {
            if (!localStorage.getItem('pcn_token')) {
                window.location.href = 'index.html';
            }
        })();

        /* ============================================================
           LOGOUT
        ============================================================ */
        function handleLogout() {
            ['caltdhy_token', 'caltdhy_user', 'pcn_token', 'pcn_user'].forEach(k => localStorage.removeItem(k));
            ['caltdhy_token', 'caltdhy_user'].forEach(k => sessionStorage.removeItem(k));
            window.location.href = 'index.html';
        }

        /* ============================================================
           SHOW USERNAME
        ============================================================ */
        (function () {
            try {
                const raw = localStorage.getItem('pcn_user') || localStorage.getItem('caltdhy_user');
                const user = raw ? JSON.parse(raw) : null;
                if (user) {
                    const name = user.name || user.username || '';
                    const el = document.getElementById('userName');
                    if (el && name) el.textContent = name;
                    const av = document.getElementById('userAvatar');
                    if (av && name) av.textContent = name.charAt(0).toUpperCase();
                }
            } catch (e) { /* ignore */ }
        })();
    </script>

    <script src="calendar.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
