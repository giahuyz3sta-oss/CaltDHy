<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaltDHy – Ngày chi tiêu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ── RESET ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Times New Roman', Times, serif;
            background: #021108;
            color: #e0ffe0;
        }

        body {
            background:
                radial-gradient(ellipse at 5% 10%, rgba(0, 130, 60, .38) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 90%, rgba(0, 90, 40, .42) 0%, transparent 50%),
                #021108;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ══════════════════════════════
           HEADER
        ══════════════════════════════ */
        .dy-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            height: 54px;
            background: rgba(0, 20, 10, .82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 200, 90, .18);
            flex-shrink: 0;
            gap: 14px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1px;
            flex-shrink: 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .logo-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #00dcc0 0%, #00a855 60%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .daily-limit-text {
            font-family: 'Times New Roman', Times, serif;
            font-size: 11px;
            color: rgba(74, 222, 128, .5);
            padding-left: 25px;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .header-page-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 15px;
            font-weight: 700;
            color: #4ade80;
            white-space: nowrap;
        }

        .header-month-label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 13px;
            color: rgba(255, 255, 255, .4);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .hdr-btn {
            font-family: 'Times New Roman', Times, serif;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, .28);
            background: rgba(0, 100, 50, .14);
            color: rgba(74, 222, 128, .8);
            cursor: pointer;
            transition: all .18s;
        }

        .hdr-btn:hover {
            background: rgba(0, 160, 80, .22);
            border-color: rgba(74, 222, 128, .55);
            color: #4ade80;
        }

        .hdr-btn.logout {
            border-color: rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .05);
            color: rgba(255, 255, 255, .55);
        }

        .hdr-btn.logout:hover {
            border-color: rgba(255, 80, 100, .45);
            color: #ff6080;
            background: rgba(255, 80, 100, .10);
        }

        /* ══════════════════════════════
           MAIN
        ══════════════════════════════ */
        .dy-main {
            flex: 1;
            padding: 22px 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .dy-main::-webkit-scrollbar {
            width: 5px;
        }

        .dy-main::-webkit-scrollbar-track {
            background: transparent;
        }

        .dy-main::-webkit-scrollbar-thumb {
            background: rgba(0, 200, 90, .18);
            border-radius: 10px;
        }

        /* 2-column grid for day cards */
        .days-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
        }

        /* ══════════════════════════════
           DAY CARD
        ══════════════════════════════ */
        .day-card {
            border-radius: 18px;
            padding: 20px 22px 18px;
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
            transition: border-color .35s, background .35s, box-shadow .35s;
            min-height: 280px;
        }

        /* ── Gray: unentered ── */
        .day-card.unentered {
            background: rgba(255, 255, 255, .025);
            border-color: rgba(255, 255, 255, .06);
        }

        /* ── Green: within limit ── */
        .day-card.within-limit {
            background: linear-gradient(155deg, rgba(0, 80, 40, .60) 0%, rgba(0, 55, 25, .70) 100%);
            border-color: rgba(0, 200, 95, .32);
            box-shadow: 0 4px 28px rgba(0, 160, 80, .14);
        }

        .day-card.within-limit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2.5px;
            background: linear-gradient(90deg, #00c864 0%, #34d399 100%);
            border-radius: 18px 18px 0 0;
        }

        /* ── Red: over limit ── */
        .day-card.over-limit {
            background: linear-gradient(155deg, rgba(80, 10, 10, .62) 0%, rgba(55, 5, 5, .72) 100%);
            border-color: rgba(248, 113, 113, .34);
            box-shadow: 0 4px 28px rgba(220, 50, 50, .13);
        }

        .day-card.over-limit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2.5px;
            background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
            border-radius: 18px 18px 0 0;
        }

        /* ── Card header ── */
        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .card-day-name {
            font-family: 'Times New Roman', Times, serif;
            font-size: 22px;
            font-weight: 700;
            color: rgba(255, 255, 255, .9);
            line-height: 1.15;
        }

        .day-card.within-limit .card-day-name {
            color: #4ade80;
        }

        .day-card.over-limit .card-day-name {
            color: #fca5a5;
        }

        .card-date-sub {
            font-family: 'Times New Roman', Times, serif;
            font-size: 12px;
            color: rgba(255, 255, 255, .35);
            margin-top: 2px;
        }

        .card-status-badge {
            font-family: 'Times New Roman', Times, serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border-radius: 20px;
            padding: 4px 10px;
            flex-shrink: 0;
        }

        .day-card.unentered .card-status-badge {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .10);
            color: rgba(255, 255, 255, .3);
        }

        .day-card.within-limit .card-status-badge {
            background: rgba(74, 222, 128, .10);
            border: 1px solid rgba(74, 222, 128, .26);
            color: #4ade80;
        }

        .day-card.over-limit .card-status-badge {
            background: rgba(248, 113, 113, .10);
            border: 1px solid rgba(248, 113, 113, .26);
            color: #f87171;
        }

        /* ── 2-column input grid ── */
        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, .35);
        }

        /* The actual clickable field */
        .input-field {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .09);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: border-color .16s, background .16s;
            min-height: 42px;
        }

        .input-field:hover {
            border-color: rgba(74, 222, 128, .4);
            background: rgba(74, 222, 128, .06);
        }

        .input-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .input-val {
            font-family: 'Times New Roman', Times, serif;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, .35);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .input-val.has-value {
            color: #4ade80;
        }

        .day-card.over-limit .input-val.has-value {
            color: #fca5a5;
        }

        /* ── Total + Save row ── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            margin-top: auto;
        }

        .total-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .total-label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, .28);
        }

        .total-val {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            font-weight: 700;
            color: rgba(255, 255, 255, .18);
        }

        .total-val.has-data {
            color: #4ade80;
        }

        .day-card.over-limit .total-val.has-data {
            color: #f87171;
        }

        .save-btn {
            font-family: 'Times New Roman', Times, serif;
            font-size: 13px;
            font-weight: 700;
            padding: 9px 22px;
            border-radius: 12px;
            border: 1px solid rgba(74, 222, 128, .32);
            background: rgba(74, 222, 128, .11);
            color: #4ade80;
            cursor: pointer;
            transition: all .16s;
            letter-spacing: .3px;
        }

        .save-btn:hover {
            background: rgba(74, 222, 128, .22);
            border-color: rgba(74, 222, 128, .6);
        }

        .save-btn:active {
            transform: scale(.97);
        }

        /* ══════════════════════════════
           MINI CALCULATOR
        ══════════════════════════════ */
        #dyCalc {
            position: fixed;
            z-index: 1200;
            background: linear-gradient(145deg, rgba(6, 22, 14, .97) 0%, rgba(12, 36, 22, .95) 60%, rgba(4, 16, 10, .97) 100%);
            border: 1px solid rgba(52, 211, 153, .45);
            border-radius: 18px;
            padding: 14px;
            width: 230px;
            box-shadow: 0 8px 48px rgba(0, 0, 0, .72), 0 0 38px rgba(20, 160, 90, .22);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        #dyCalc.open {
            display: flex;
        }

        #calcDisplay {
            background: rgba(12, 50, 30, .55);
            border: 1px solid rgba(52, 211, 153, .32);
            border-radius: 10px;
            padding: 8px 12px;
            text-align: right;
            min-height: 44px;
        }

        .calc-expr-line {
            font-family: 'Times New Roman', Times, serif;
            font-size: 10px;
            color: rgba(110, 231, 183, .45);
            min-height: 14px;
            display: block;
        }

        .calc-val-line {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            font-weight: 700;
            color: #6ee7b7;
            display: block;
            word-break: break-all;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .calc-btn {
            font-family: 'Times New Roman', Times, serif;
            padding: 9px 0;
            border: 1px solid rgba(52, 211, 153, .12);
            border-radius: 8px;
            background: rgba(20, 70, 45, .35);
            color: rgba(200, 255, 220, .8);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .14s, color .14s;
            text-align: center;
        }

        .calc-btn:hover {
            background: rgba(52, 211, 153, .22);
            color: #fff;
        }

        .calc-btn.op {
            color: #34d399;
        }

        .calc-btn.op:hover {
            background: rgba(52, 211, 153, .3);
        }

        .calc-btn.clr {
            color: #f87171;
        }

        .calc-btn.clr:hover {
            background: rgba(248, 113, 113, .18);
        }

        .calc-btn.eq {
            grid-column: span 2;
            background: rgba(52, 211, 153, .20);
            border-color: rgba(52, 211, 153, .5);
            color: #6ee7b7;
        }

        .calc-btn.eq:hover {
            background: rgba(52, 211, 153, .38);
            color: #fff;
        }

        .calc-hint {
            font-family: 'Times New Roman', Times, serif;
            font-size: 10px;
            color: rgba(255, 255, 255, .22);
            text-align: right;
        }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width: 860px) {
            .days-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .dy-header {
                padding: 0 12px;
                flex-wrap: wrap;
                height: auto;
                padding-top: 8px;
                padding-bottom: 8px;
            }

            .header-center {
                display: none;
            }

            .dy-main {
                padding: 14px 12px;
            }

            #dyCalc {
                width: calc(100vw - 28px);
                left: 14px !important;
            }
        }
    </style>
</head>

<body>

    <!-- ══ HEADER ══ -->
    <header class="dy-header">
        <div class="header-left">
            <div class="logo-row">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                    <defs>
                        <linearGradient id="dylg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#00dcc0" />
                            <stop offset="100%" stop-color="#00a855" />
                        </linearGradient>
                    </defs>
                    <circle cx="16" cy="16" r="13" stroke="url(#dylg)" stroke-width="2" fill="none" />
                    <line x1="16" y1="16" x2="16" y2="8" stroke="url(#dylg)" stroke-width="2.2"
                        stroke-linecap="round" />
                    <line x1="16" y1="16" x2="22" y2="19" stroke="url(#dylg)" stroke-width="1.8" stroke-linecap="round"
                        opacity=".8" />
                    <circle cx="16" cy="16" r="2" fill="url(#dylg)" />
                </svg>
                <span class="logo-text">CaltDHy</span>
            </div>
            <div class="daily-limit-text" id="hdrLimit">Hạn mức ngày: Chưa đặt</div>
        </div>

        <div class="header-center">
            <span class="header-page-title" id="hdrTitle">📆 Tuần 1</span>
            <span class="header-month-label" id="hdrMonth">Tháng 3 / 2026</span>
        </div>

        <div class="header-right">
            <button class="hdr-btn" id="backBtn">← Quay lại</button>
            <button class="hdr-btn logout" onclick="handleLogout()">Đăng xuất</button>
        </div>
    </header>

    <!-- ══ MAIN ══ -->
    <main class="dy-main">
        <div class="days-grid" id="daysGrid"><!-- JS --></div>
    </main>

    <!-- ══ MINI CALCULATOR ══ -->
    <div id="dyCalc">
        <div id="calcDisplay">
            <span class="calc-expr-line" id="calcExpr"></span>
            <span class="calc-val-line" id="calcVal">0</span>
        </div>
        <div class="calc-grid">
            <button class="calc-btn clr" data-a="clr">CLR</button>
            <button class="calc-btn" data-a="del">⌫</button>
            <button class="calc-btn op" data-a="op" data-v="%">%</button>
            <button class="calc-btn op" data-a="op" data-v="/">÷</button>
            <button class="calc-btn" data-a="num" data-v="7">7</button>
            <button class="calc-btn" data-a="num" data-v="8">8</button>
            <button class="calc-btn" data-a="num" data-v="9">9</button>
            <button class="calc-btn op" data-a="op" data-v="*">×</button>
            <button class="calc-btn" data-a="num" data-v="4">4</button>
            <button class="calc-btn" data-a="num" data-v="5">5</button>
            <button class="calc-btn" data-a="num" data-v="6">6</button>
            <button class="calc-btn op" data-a="op" data-v="-">−</button>
            <button class="calc-btn" data-a="num" data-v="1">1</button>
            <button class="calc-btn" data-a="num" data-v="2">2</button>
            <button class="calc-btn" data-a="num" data-v="3">3</button>
            <button class="calc-btn op" data-a="op" data-v="+">+</button>
            <button class="calc-btn" data-a="num" data-v="0">0</button>
            <button class="calc-btn" data-a="num" data-v=".">.</button>
            <button class="calc-btn eq" data-a="eq">= Enter</button>
        </div>
        <div class="calc-hint">Enter → xác nhận &nbsp;•&nbsp; Esc → hủy</div>
    </div>

    <script>
        /* ============================================================
           AUTH GUARD
        ============================================================ */
        (function () {
            if (!localStorage.getItem('pcn_token')) {
                window.location.href = 'index.html';
            }
        })();

        /* ── PARAMS ── */
        const p = new URLSearchParams(window.location.search);
        const weekNum = parseInt(p.get('week')) || 1;
        const month = parseInt(p.get('month')) || new Date().getMonth() + 1;
        const year = parseInt(p.get('year')) || new Date().getFullYear();
        const startDay = parseInt(p.get('startDay')) || 1;
        const endDay = parseInt(p.get('endDay')) || 7;

        const MONTH_VI = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
            'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
        const DOW_VI = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
        const CAT_KEYS = ['food', 'gas', 'coffee', 'misc'];
        const CAT_NAMES = ['Ăn uống', 'Xăng xe', 'Cà phê', 'Linh tinh'];
        const CAT_COLORS = ['#34d399', '#60a5fa', '#c084fc', '#f59e0b'];

        const API_BASE = 'https://caltdhy.onrender.com';
        function getToken() { return localStorage.getItem('pcn_token') || ''; }

        function numFmt(n) {
            if (!n || n <= 0) return '0 ₫';
            return Number(n).toLocaleString('vi-VN') + ' ₫';
        }

        /* ── Toast helper ── */
        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;
                border-radius:12px;font-family:'Times New Roman',serif;font-size:14px;font-weight:600;
                background:${isError ? 'rgba(220,50,50,.92)' : 'rgba(52,211,153,.92)'};
                color:#fff;box-shadow:0 4px 24px rgba(0,0,0,.4);transition:opacity .4s;`;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2500);
        }

        /* ── In-memory store: { dayNum → {food,gas,coffee,misc} } ── */
        const serverData = {};   // loaded from API
        const pending = {};   // unsaved local changes

        let dailyLimit = 0;

        /* ── API HELPERS ── */
        async function apiFetch(path, opts = {}) {
            return fetch(API_BASE + path, {
                ...opts,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken(),
                    ...(opts.headers || {})
                }
            });
        }

        async function loadBudget() {
            try {
                const res = await apiFetch('/api/spending/budget');
                const data = await res.json();
                if (data.success) dailyLimit = data.data.dailyLimit || 0;
            } catch { /* fallback = 0 */ }
        }

        async function loadMonthData() {
            try {
                const res = await apiFetch(`/api/spending?year=${year}&month=${month}`);
                const data = await res.json();
                if (data.success && Array.isArray(data.data)) {
                    data.data.forEach(rec => {
                        serverData[rec.day] = {
                            food: rec.food || 0, gas: rec.gas || 0,
                            coffee: rec.coffee || 0, misc: rec.misc || 0
                        };
                    });
                }
            } catch { /* use empty */ }
        }

        async function saveDayAPI(d) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const data = pending[d] || serverData[d] || { food: 0, gas: 0, coffee: 0, misc: 0 };
            const saveBtn = document.querySelector(`[data-saveday="${d}"]`);
            if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Đang lưu...'; }
            try {
                const res = await apiFetch(`/api/spending/${dateStr}`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (json.success) {
                    serverData[d] = { ...data };
                    delete pending[d];
                    showToast(`✓ Đã lưu ngày ${d}/${month}`);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✓ Đã lưu!'; }
                    setTimeout(() => { if (saveBtn) saveBtn.textContent = '💾 Lưu'; }, 1500);
                } else {
                    throw new Error(json.message || 'Lỗi server');
                }
            } catch (err) {
                showToast('⚠ Lưu thất bại: ' + err.message, true);
                if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Lưu'; }
            }
        }

        /* ── Data helpers ── */
        function effectiveData(d) {
            return pending[d] || serverData[d] || { food: 0, gas: 0, coffee: 0, misc: 0 };
        }

        function dayTotal(d) {
            const data = effectiveData(d);
            return CAT_KEYS.reduce((s, k) => s + (parseFloat(data[k]) || 0), 0);
        }

        function statusFor(d) {
            const total = dayTotal(d);
            if (total === 0) return 'unentered';
            if (dailyLimit > 0 && total > dailyLimit) return 'over-limit';
            return 'within-limit';
        }

        function statusText(d) {
            const s = statusFor(d);
            if (s === 'unentered') return 'Chưa nhập';
            if (s === 'within-limit') return '✓ Trong hạn mức';
            return '⚠ Vượt hạn mức';
        }

        function updateCard(d) {
            const card = document.getElementById(`dayCard${d}`);
            if (!card) return;
            const data = effectiveData(d);
            const total = CAT_KEYS.reduce((s, k) => s + (parseFloat(data[k]) || 0), 0);
            const status = statusFor(d);
            card.className = `day-card ${status}`;
            const badge = card.querySelector('.card-status-badge');
            if (badge) badge.textContent = statusText(d);
            CAT_KEYS.forEach(k => {
                const valSpan = card.querySelector(`[data-valkey="${d}-${k}"]`);
                if (valSpan) {
                    const v = parseFloat(data[k]) || 0;
                    valSpan.textContent = v > 0 ? numFmt(v) : '+ Nhập';
                    valSpan.className = 'input-val' + (v > 0 ? ' has-value' : '');
                }
            });
            const totalEl = card.querySelector(`[data-totalval="${d}"]`);
            if (totalEl) {
                totalEl.textContent = numFmt(total);
                totalEl.className = 'total-val' + (total > 0 ? ' has-data' : '');
            }
        }

        /* ══════════════════════════════
           MINI CALCULATOR
        ══════════════════════════════ */
        const calcEl = document.getElementById('dyCalc');
        const exprEl = document.getElementById('calcExpr');
        const valEl = document.getElementById('calcVal');
        let calcCur = '', calcExpr = '', calcCb = null, _justOpened = false;

        function calcRefresh() {
            valEl.textContent = calcCur !== '' ? calcCur : '0';
            exprEl.textContent = calcExpr;
        }

        function calcEval() {
            const raw = calcExpr + calcCur;
            if (!raw) return 0;
            try {
                const safe = raw.replace(/[^0-9+\-*/.%()]/g, '').replace(/(\d+)%/g, '($1/100)');
                const res = Function('"use strict";return(' + safe + ')')();
                return isFinite(res) ? Math.max(0, Math.round(res)) : 0;
            } catch { return 0; }
        }

        function openCalc(anchor, seed, cb) {
            calcCb = cb;
            calcCur = seed > 0 ? String(seed) : '';
            calcExpr = '';
            calcRefresh();
            const r = anchor.getBoundingClientRect();
            let top = r.bottom + 6, left = r.right - 230;
            if (left < 8) left = 8;
            if (top + 340 > window.innerHeight) top = r.top - 340;
            calcEl.style.top = top + 'px';
            calcEl.style.left = left + 'px';
            _justOpened = true;
            calcEl.classList.add('open');
        }

        function closeCalc() {
            calcEl.classList.remove('open');
            calcCur = ''; calcExpr = ''; calcCb = null;
            calcRefresh();
        }

        function confirmCalc() {
            const res = calcEval();
            if (calcCb) calcCb(res);
            closeCalc();
        }

        calcEl.addEventListener('click', e => {
            const btn = e.target.closest('.calc-btn');
            if (!btn) return;
            e.stopPropagation();
            const a = btn.dataset.a, v = btn.dataset.v;
            if (a === 'num') { if (v === '.' && calcCur.includes('.')) return; calcCur += v; }
            else if (a === 'op') {
                if (calcCur) { calcExpr += calcCur + v; calcCur = ''; }
                else if (calcExpr) { calcExpr = calcExpr.replace(/[+\-*/%]$/, v); }
            } else if (a === 'clr') { calcCur = ''; calcExpr = ''; }
            else if (a === 'del') { if (calcCur.length > 0) calcCur = calcCur.slice(0, -1); else calcExpr = calcExpr.slice(0, -1); }
            else if (a === 'eq') { confirmCalc(); return; }
            calcRefresh();
        });

        document.addEventListener('keydown', e => {
            if (!calcEl.classList.contains('open')) return;
            if (e.key === 'Escape') { closeCalc(); return; }
            if (e.key === 'Enter') { confirmCalc(); return; }
            if (e.key === 'Backspace') {
                if (calcCur.length) calcCur = calcCur.slice(0, -1);
                else calcExpr = calcExpr.slice(0, -1);
                calcRefresh(); return;
            }
            if ('0123456789'.includes(e.key)) { calcCur += e.key; calcRefresh(); }
            if (['+', '-', '*', '/', '%'].includes(e.key)) {
                if (calcCur) { calcExpr += calcCur + e.key; calcCur = ''; }
                else if (calcExpr) { calcExpr = calcExpr.replace(/[+\-*/%]$/, e.key); }
                calcRefresh();
            }
            if (e.key === '.') { if (!calcCur.includes('.')) { calcCur += '.'; calcRefresh(); } }
        });

        document.addEventListener('click', e => {
            if (_justOpened) { _justOpened = false; return; }
            if (calcEl.classList.contains('open') && !calcEl.contains(e.target)) closeCalc();
        });

        /* ══════════════════════════════
           BUILD CARDS
        ══════════════════════════════ */
        function buildCard(d) {
            const date = new Date(year, month - 1, d);
            const today = new Date();
            const isToday = today.getDate() === d && today.getMonth() + 1 === month && today.getFullYear() === year;
            const dowName = DOW_VI[date.getDay()];
            const status = statusFor(d);

            const card = document.createElement('div');
            card.className = `day-card ${status}`;
            card.id = `dayCard${d}`;

            card.innerHTML = `
                <div class="card-top">
                    <div>
                        <div class="card-day-name">${dowName}${isToday ? ' 📍' : ''}</div>
                        <div class="card-date-sub">${d}/${month}/${year}</div>
                    </div>
                    <span class="card-status-badge">${statusText(d)}</span>
                </div>

                <div class="inputs-grid">
                    ${CAT_KEYS.map((k, i) => {
                const data = effectiveData(d);
                const v = parseFloat(data[k]) || 0;
                return `
                        <div class="input-group">
                            <div class="input-label">${CAT_NAMES[i]}</div>
                            <div class="input-field" data-day="${d}" data-cat="${k}">
                                <span class="input-dot" style="background:${CAT_COLORS[i]};"></span>
                                <span class="input-val${v > 0 ? ' has-value' : ''}" data-valkey="${d}-${k}">
                                    ${v > 0 ? numFmt(v) : '+ Nhập'}
                                </span>
                            </div>
                        </div>`;
            }).join('')}
                </div>

                <div class="card-footer">
                    <div class="total-group">
                        <span class="total-label">Tổng ngày</span>
                        <span class="total-val${dayTotal(d) > 0 ? ' has-data' : ''}" data-totalval="${d}">${numFmt(dayTotal(d))}</span>
                    </div>
                    <button class="save-btn" data-saveday="${d}">💾 Lưu</button>
                </div>
            `;

            /* Wire input clicks → mini calc */
            card.querySelectorAll('.input-field').forEach(field => {
                field.addEventListener('click', e => {
                    e.stopPropagation();
                    const fd = parseInt(field.dataset.day);
                    const cat = field.dataset.cat;
                    const cur = parseFloat(effectiveData(fd)[cat]) || 0;
                    openCalc(field, cur, result => {
                        if (!pending[fd]) pending[fd] = { ...effectiveData(fd) };
                        pending[fd][cat] = result;
                        updateCard(fd);
                    });
                });
            });

            /* Wire save button → API */
            card.querySelector('.save-btn').addEventListener('click', () => {
                saveDayAPI(d);
            });

            return card;
        }

        /* ── RENDER ── */
        function render() {
            document.getElementById('hdrTitle').textContent = `📆 Tuần ${weekNum}`;
            document.getElementById('hdrMonth').textContent = `${MONTH_VI[month - 1]} / ${year}`;
            document.title = `CaltDHy – Tuần ${weekNum} / ${MONTH_VI[month - 1]} ${year}`;
            document.getElementById('hdrLimit').textContent =
                dailyLimit > 0 ? `Hạn mức ngày: ${numFmt(dailyLimit)}` : 'Hạn mức ngày: Chưa đặt';

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';
            for (let d = startDay; d <= endDay; d++) {
                grid.appendChild(buildCard(d));
            }
        }

        /* ── NAVIGATION ── */
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = `spending_weekly.html?month=${month}&year=${year}`;
        });

        function handleLogout() {
            ['caltdhy_token', 'caltdhy_user', 'pcn_token', 'pcn_user'].forEach(k => localStorage.removeItem(k));
            ['caltdhy_token', 'caltdhy_user'].forEach(k => sessionStorage.removeItem(k));
            window.location.href = 'index.html';
        }

        /* ── INIT: load budget + data → render ── */
        (async function init() {
            await Promise.all([loadBudget(), loadMonthData()]);
            render();
        })();
    </script>
